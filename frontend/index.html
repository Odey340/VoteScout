<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Find your elections, understand your ballot, and make a plan to vote — in minutes." />
    <meta property="og:title" content="Groma — Find your elections" />
    <meta property="og:description" content="Find your elections, understand your ballot, and make a plan to vote — in minutes." />
    <title>Groma — Find your elections</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set theme before first paint to avoid a flash.
      const saved = localStorage.getItem('groma-theme') ?? localStorage.getItem('votescout-theme')
      const dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
      document.documentElement.dataset.theme = dark ? 'dark' : 'light'
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
